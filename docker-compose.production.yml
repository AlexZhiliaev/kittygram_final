version: '3'

volumes:
  pg_data:
  static:
  media:


services:
  db:
    image: postgres:13
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
  backend:
    image: darkbasilur/kittygram_backend
    env_file: .env
    volumes:
      - static:/backend_static
      - media:/app/media
    depends_on:
      - db
  frontend:
    image: darkbasilur/kittygram_frontend
    env_file: .env
    command: cp -r /app/build/. /static/
    volumes:
      - static:/static
  gateway:
    image: darkbasilur/kittygram_gateway
    env_file: .env
    ports:
      - "127.0.0.1:9000:80"
    volumes:
      - static:/static
      - media:/media
    depends_on:
      - backend
